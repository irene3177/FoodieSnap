services:
  - type: web
    name: foodiesnap-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false
      - key: FRONTEND_URL
        value: https://${FOODIESNAP}.onrender.com
      - key: COOKIE_DOMAIN
        value: .onrender.com