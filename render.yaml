services:
  - type: web
    name: foodiesnap
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install --include=dev && npm run build && cd ../backend && npm install --include=dev && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false


