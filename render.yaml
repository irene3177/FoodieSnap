services:
  - type: web
    name: foodiesnap-api
    runtime: node
    plan: free
    buildCommand: cd backend && npm install && npm run build
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: MONGODB_URI
        fromDatabase:
          name: foodiesnap-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://${FOODIESNAP}.onrender.com
      - key: COOKIE_DOMAIN
        value: .onrender.com

  - type: web
    name: foodiesnap
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://${FOODIESNAP_API}.onrender.com/api
      - key: VITE_WS_URL
        value: wss://${FOODIESNAP_API}.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: database
    name: foodiesnap-db
    plan: free